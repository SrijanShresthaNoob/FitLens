name: fitlens
description: AI-powered calorie & macro tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  fl_chart: ^0.68.0
  provider: ^6.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.0.7
  image: ^4.1.3
  http: ^1.2.0
  shared_preferences: ^2.2.2
  google_mobile_ads: ^4.0.0
  flutter_local_notifications: ^17.0.0
  intl: ^0.19.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  camera: ^0.11.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/icon/icon.png"